events {
    worker_connections 1024;
}

http {

    # HTTP → HTTPS 강제 리다이렉트
    server {
        listen 80;
        server_name promoter.co.kr www.promoter.co.kr;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name promoter.co.kr www.promoter.co.kr;

        # SSL 인증서 (NCP에서 발급받은 인증서 경로)
        ssl_certificate     /etc/nginx/ssl/promoter.crt;
        ssl_certificate_key /etc/nginx/ssl/promoter.key;

        # 취약 프로토콜 차단
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 일반 API
        location / {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket — /ws/** 경로
        location /ws/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;   # WebSocket 연결 유지
            proxy_send_timeout 3600s;
        }

        # 업로드 파일 (정적 파일 직접 서빙 — Object Storage 전환 전까지)
        location /uploads/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}