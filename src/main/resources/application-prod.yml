spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

file:
  base-url: https://promoter.co.kr

logging:
  level:
    com.example.demo: INFO
    org.springframework.web: WARN

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: https://promoter.co.kr/auth/kakao/callback

app:
  cookie:
    secure: true
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false