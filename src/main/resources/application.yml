spring:
  application:
    name: demo

  datasource:
    url: jdbc:mysql://localhost:3306/jucompany?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: ***REMOVED***
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: my-super-secret-jwt-key-for-demo-project-2026-security
  expiration: 3600000

server:
  error:
    include-message: always
    include-binding-errors: always

file:
  upload-dir: uploads
  base-url: http://localhost:8080