spring:
  application:
    name: demo

  datasource:
    url: jdbc:mysql://localhost:3306/jucompany?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: ***REMOVED***
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: my-super-secret-jwt-key-for-demo-project-2026-security
  expiration: 3600000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:dummy}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/auth/kakao/callback}
  google:
    client-id: ${GOOGLE_CLIENT_ID:dummy}
    client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}
  naver:
    client-id: ${NAVER_CLIENT_ID:dummy}
    client-secret: ${NAVER_CLIENT_SECRET:dummy}
    redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8080/auth/naver/callback}

server:
  error:
    include-message: always
    include-binding-errors: always

file:
  upload-dir: uploads
  base-url: http://localhost:8080

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/staffnow.log

kakao:
  api:
    key: ${KAKAO_API_KEY:dummy}

nts:
  api:
    key: ${NTS_API_KEY:dummy}