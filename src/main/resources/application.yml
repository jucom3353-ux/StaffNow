spring:
  application:
    name: demo

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: jdbc:mysql://localhost:3306/jucompany?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:dummy}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/auth/kakao/callback}

server:
  error:
    include-message: always
    include-binding-errors: always

file:
  upload-dir: uploads
  base-url: http://localhost:8080

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/staffnow.log

kakao:
  api:
    key: ${KAKAO_API_KEY:dummy}

nts:
  api:
    key: ${NTS_API_KEY:dummy}

app:
  cookie:
    secure: false
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

coolsms:
  api-key: ${COOLSMS_API_KEY:}
  api-secret: ${COOLSMS_API_SECRET:}
  sender: ${COOLSMS_SENDER:}