<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="5" y1="95" x2="95" y2="5" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B00"/>
      <stop offset="1" stop-color="#FFB800"/>
    </linearGradient>
  </defs>

  <!-- Shaft: lower-left to upper-right (arrow 1) -->
  <line x1="16" y1="77" x2="68" y2="34"
        stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>

  <!-- Shaft: upper-right to lower-left (arrow 2, drawn on top for weave effect) -->
  <line x1="84" y1="23" x2="32" y2="66"
        stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>

  <!-- NE arrowhead: L-bracket at upper-right -->
  <polyline points="54,12 87,12 87,45"
            stroke="url(#g)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- SW arrowhead: L-bracket at lower-left -->
  <polyline points="46,88 13,88 13,55"
            stroke="url(#g)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>
</svg>
